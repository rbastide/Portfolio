<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Bastide Rémi</title>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased selection:bg-indigo-100 selection:text-indigo-700 dark:selection:bg-indigo-900 dark:selection:text-indigo-300 transition-colors duration-300">

    <nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <span class="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2 tracking-tight">
                    <i data-lucide="briefcase" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
                    Portfolio
                </span>
                <div class="flex items-center gap-6 text-sm font-medium text-slate-600 dark:text-slate-300" id="desktop-nav">
                </div>
            </div>
        </div>
    </nav>

    <main id="app" class="w-full">
    </main>

    <footer class="bg-slate-50 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-12 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-6 text-center reveal">
            <p class="font-semibold text-slate-900 dark:text-white mb-2">&copy; 2026 Bastide Rémi</p>
            <p class="text-xs text-slate-500 dark:text-slate-400">Developpé en html/css • BUT Informatique</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
