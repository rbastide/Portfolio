<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Bastide Rémi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Boot Sequence Overlay -->
    <div id="boot-overlay">
        <div id="boot-log"></div>
        <div id="boot-cursor">█</div>
    </div>

    <!-- Scanline effect -->
    <div class="scanlines"></div>

    <!-- Navigation -->
    <nav id="main-nav">
        <div class="nav-inner">
            <a href="#home" class="nav-logo">
                <span class="prompt">&gt;</span> bastide_remi<span class="blink">_</span>
            </a>
            <div class="nav-links">
                <a href="#home" class="nav-link active" data-section="home">[accueil]</a>
                <a href="#skills" class="nav-link" data-section="skills">[compétences]</a>
                <a href="#projects" class="nav-link" data-section="projects">[projets]</a>
                <a href="#contact" class="nav-link" data-section="contact">[contact]</a>
                <div class="nav-status">
                    <span class="status-dot"></span>
                    <span class="status-text">ONLINE</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app"></main>

    <!-- Chatbot -->
    <button id="chatbot-toggle" aria-label="Ouvrir le chatbot">
        <span class="chatbot-toggle-icon">&gt;_</span>
    </button>
    <div id="chatbot" class="chatbot-closed">
        <div class="chatbot-header">
            <div class="chatbot-header-left">
                <span class="status-dot"></span>
                <span class="chatbot-title">&gt; ReyMysterio_</span>
            </div>
            <button id="chatbot-close" aria-label="Fermer le chatbot">✕</button>
        </div>
        <div id="chatbot-messages"></div>
        <div class="chatbot-input-wrap">
            <span class="chatbot-prompt">&gt;</span>
            <input type="text" id="chatbot-input" placeholder="Posez une question sur Rémi..." autocomplete="off">
            <button id="chatbot-send" aria-label="Envoyer">↵</button>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer">
        <div class="footer-inner">
            <div class="footer-line">© 2026 Bastide Rémi — @rbastide</div>
            <div class="footer-line dim">// Portfolio personnel — BUT Informatique</div>
            <div class="footer-line dim">// Développé en HTML/CSS/JS</div>
            <div class="footer-status">
                <span class="status-dot"></span> online
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
